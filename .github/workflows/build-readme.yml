name: Build README.adoc

on:
  push:
    paths-ignore:
      - "README.adoc"

permissions:
  contents: write

jobs:
  build-readme:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Generate README.adoc
        run: |
          python tools/gen_readme.py

      - name: Commit and push if changed
        run: |
          # Stage README if present/changed (including untracked)
          if [ -z "$(git status --porcelain -- README.adoc)" ]; then
            echo "README.adoc unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.adoc
          git commit -m "chore: auto-generate README.adoc"
          git push
